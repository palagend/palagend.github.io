<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>工具集合</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧰</text></svg>">
  <style>
    /* 首屏加载动画 */
    #app-loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }
    #app-loading.hidden {
      opacity: 0;
      visibility: hidden;
    }
    .loading-spinner {
      width: 60px;
      height: 60px;
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-top-color: #00d4ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    .loading-text {
      margin-top: 20px;
      color: #fff;
      font-size: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      letter-spacing: 2px;
    }
    .loading-dots::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes dots {
      0%, 20% { content: ''; }
      40% { content: '.'; }
      60% { content: '..'; }
      80%, 100% { content: '...'; }
    }
    /* 进度条 */
    .progress-bar {
      width: 200px;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      margin-top: 30px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #00d4ff, #7b2cbf);
      border-radius: 2px;
      animation: progress 2s ease-in-out infinite;
      transform-origin: left;
    }
    @keyframes progress {
      0% { transform: scaleX(0); }
      50% { transform: scaleX(0.7); }
      100% { transform: scaleX(1); }
    }
  </style>
  <script type="module" crossorigin src="/js/index-B3JyYIom.js"></script>
  <link rel="modulepreload" crossorigin href="/js/chunk-rolldown-runtime-DUsYv1c8.js">
  <link rel="modulepreload" crossorigin href="/js/chunk-app-core-CqTwKe9C.js">
  <link rel="modulepreload" crossorigin href="/js/chunk-feature-mobile-DLUAlXIH.js">
  <link rel="modulepreload" crossorigin href="/js/chunk-feature-portfolio-TPzxfUWY.js">
  <link rel="modulepreload" crossorigin href="/js/chunk-feature-tools-Cr0wjVNT.js">
  <link rel="modulepreload" crossorigin href="/js/chunk-feature-password-BO4CLJxC.js">
  <link rel="stylesheet" crossorigin href="/css/feature-mobile-W2P8JQAo.css">
  <link rel="stylesheet" crossorigin href="/css/feature-portfolio-DFnTJgO_.css">
  <link rel="stylesheet" crossorigin href="/css/feature-tools-Ct1hoKNN.css">
  <link rel="stylesheet" crossorigin href="/css/feature-password-C9vshDCD.css">
  <link rel="stylesheet" crossorigin href="/css/index-CunLCXHf.css">
</head>
<body>
  <div id="app"></div>
  
  <!-- 首屏加载动画 -->
  <div id="app-loading">
    <div class="loading-spinner"></div>
    <div class="loading-text">加载中<span class="loading-dots"></span></div>
    <div class="progress-bar">
      <div class="progress-fill"></div>
    </div>
  </div>
  
  <script>
    // 监听页面加载完成，隐藏loading
    window.addEventListener('load', function() {
      setTimeout(function() {
        var loading = document.getElementById('app-loading');
        if (loading) {
          loading.classList.add('hidden');
          setTimeout(function() {
            loading.remove();
          }, 300);
        }
      }, 100);
    });
    // 超时处理（10秒后强制隐藏）
    setTimeout(function() {
      var loading = document.getElementById('app-loading');
      if (loading) {
        loading.classList.add('hidden');
        setTimeout(function() {
          loading.remove();
        }, 300);
      }
    }, 10000);
  </script>
</body>
</html>
