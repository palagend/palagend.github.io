<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    // 保存当前路径到 sessionStorage，然后重定向到首页
    sessionStorage.setItem('redirect', location.pathname + location.search + location.hash);
    location.replace('/' + location.pathname.split('/')[1] + '/');
  </script>
</head>
<body>
  Redirecting...
</body>
</html>
